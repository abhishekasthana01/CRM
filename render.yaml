services:
  - type: web
    name: beam-crm
    env: php
    plan: starter
    buildCommand: |
      composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-calendar --ignore-platform-req=ext-gd --ignore-platform-req=ext-zip
      npm install
      npm run build
      php artisan key:generate --force
      php artisan migrate --force
    startCommand: php -S 0.0.0.0:$PORT -t public
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_NAME
        value: "Beam CRM"
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: APP_LOCALE
        value: en
      - key: APP_CURRENCY
        value: USD
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: BROADCAST_DRIVER
        value: log
      - key: QUEUE_CONNECTION
        value: sync
      - key: DATABASE_URL
        fromDatabase:
          name: beam-crm-db
          property: connectionString

databases:
  - name: beam-crm-db
    databaseName: beam_crm
    user: beam_crm
    plan: starter
